# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/users}

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# HTTP
quarkus.http.port=${PORT:8080}

# Business rules and external clients
quarkus.config.locations=business.properties,clients.properties

# OpenAPI and Swagger UI
quarkus.swagger-ui.always-include=true

# Security: SmallRye JWT (RS256). Keys are PEM files on the classpath.
# In production override the locations and/or mount real keys via secrets.
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://user-service.local}
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=${JWT_ISSUER:https://user-service.local}
smallrye.jwt.new-token.lifespan=${JWT_LIFESPAN_SECONDS:3600}

# Test profile: run tests without PostgreSQL/Docker
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create